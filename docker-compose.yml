services:
  api:
    build:
      context: ./api
    command: sh -c "cp -n .env.example .env && php artisan key:generate --force && mkdir -p database && touch database/database.sqlite && php artisan migrate --seed --force && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_URL: http://127.0.0.1:8000
      FRONTEND_URL: http://127.0.0.1:5173
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio-secret
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: template
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: http://127.0.0.1:9000/template
      AWS_USE_PATH_STYLE_ENDPOINT: 'true'
      REVERB_APP_ID: template-app
      REVERB_APP_KEY: template-key
      REVERB_APP_SECRET: template-secret
      REVERB_HOST: 127.0.0.1
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      TELESCOPE_ENABLED: 'true'
    ports:
      - '8000:8000'
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      - redis
      - minio

  horizon:
    build:
      context: ./api
    command: php artisan horizon
    environment:
      APP_ENV: local
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      - api
      - redis

  reverb:
    build:
      context: ./api
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      APP_ENV: local
      BROADCAST_CONNECTION: reverb
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REVERB_APP_ID: template-app
      REVERB_APP_KEY: template-key
      REVERB_APP_SECRET: template-secret
      REVERB_HOST: 127.0.0.1
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    ports:
      - '8080:8080'
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      - api
      - redis

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      VITE_API_BASE_URL: /api/v1
      VITE_REVERB_APP_KEY: template-key
      VITE_REVERB_HOST: 127.0.0.1
      VITE_REVERB_PORT: 8080
      VITE_REVERB_SCHEME: http
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
      - reverb

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio-secret;
      mc mb --ignore-existing local/template;
      mc anonymous set download local/template;
      "

volumes:
  api_vendor:
  frontend_node_modules:
  minio_data:
